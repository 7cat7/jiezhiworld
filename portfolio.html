<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部作品 | 介之的世界</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content" style="margin-left:0;">
        <div class="portfolio-title">作品集</div>

        <div class="portfolio-sort-bar refactor-sort-bar primary-library-menu">
            <input id="portfolio-search" class="portfolio-search" type="search" placeholder="搜索标题、专辑或正文">
            <a href="index.html" class="portfolio-sort-btn back-home-btn">返回主页</a>
        </div>

        <section id="library-landing" class="library-entry-grid">
            <a class="library-entry-card" data-board-link="poetry" href="portfolio.html?type=poetry">
                <h2>诗歌</h2>
                <p>进入诗歌作品库</p>
            </a>

            <a class="library-entry-card" data-board-link="prose" href="portfolio.html?type=prose">
                <h2>散文</h2>
                <p>进入散文作品库</p>
            </a>
        </section>

        <section id="board-view" class="work-board-view" hidden>
            <div class="work-board-header">
                <h2 id="board-title">诗歌</h2>
                <span id="board-count" class="work-count">0 篇</span>
            </div>

            <div class="sub-sort-bar">
                <button class="portfolio-sort-btn active" data-order="desc">时间倒序</button>
                <button class="portfolio-sort-btn" data-order="asc">时间正序</button>
            </div>

            <div class="portfolio-list" id="portfolio-list">
                <!-- 当前板块作品列表由 JS 动态生成 -->
            </div>
        </section>

        <div style="text-align:center; margin-top:2em; margin-bottom:2em;">
            <a href="index.html" class="back-home-btn">返回主页</a>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 介之的世界 | jiezhiworld</p>
    </footer>
    <script src="js/library-data.js"></script>
    <script src="js/works-store.js"></script>
    <script src="js/portfolio.js"></script>
</body>
</html>
