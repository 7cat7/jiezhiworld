<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部作品 | 介之的世界</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content" style="margin-left:0;">
        <div class="portfolio-title">全部作品</div>

        <div class="portfolio-sort-bar refactor-sort-bar">
            <input id="portfolio-search" class="portfolio-search" type="search" placeholder="搜索标题、专辑或正文">
            <button class="portfolio-sort-btn active" data-order="desc">时间倒序</button>
            <button class="portfolio-sort-btn" data-order="asc">时间正序</button>
            <button id="toggle-upload-panel" class="portfolio-sort-btn">添加作品</button>
        </div>

        <section id="upload-panel" class="upload-panel" hidden>
            <h2>添加作品</h2>
            <p class="upload-hint">静态网页无法直接写回项目文件；这里会先保存到当前浏览器本地。确认无误后，可导出 JSON，再提交到项目库。</p>
            <form id="work-upload-form" class="work-upload-form">
                <div class="form-row">
                    <label for="work-title-input">标题</label>
                    <input id="work-title-input" name="title" type="text" placeholder="作品标题" required>
                </div>
                <div class="form-row form-row-inline">
                    <div>
                        <label for="work-type-input">板块</label>
                        <select id="work-type-input" name="type">
                            <option value="poetry">诗歌</option>
                            <option value="prose">散文</option>
                        </select>
                    </div>
                    <div>
                        <label for="work-date-input">时间戳</label>
                        <input id="work-date-input" name="date" type="date" required>
                    </div>
                    <div>
                        <label for="work-collection-input">专辑 / 系列</label>
                        <input id="work-collection-input" name="collection" type="text" placeholder="如：再见，海浪">
                    </div>
                </div>
                <div class="form-row">
                    <label for="work-file-input">上传 txt / md / json</label>
                    <input id="work-file-input" type="file" accept=".txt,.md,.json,text/plain,application/json">
                </div>
                <div class="form-row">
                    <label for="work-content-input">正文</label>
                    <textarea id="work-content-input" name="content" rows="12" placeholder="可直接粘贴正文；换行会被保留。" required></textarea>
                </div>
                <div class="upload-actions">
                    <button type="submit" class="portfolio-sort-btn active">保存到本地作品库</button>
                    <button type="button" id="export-local-works" class="portfolio-sort-btn">导出本地 JSON</button>
                    <button type="button" id="clear-local-works" class="portfolio-sort-btn danger-btn">清空本地新增</button>
                </div>
            </form>
        </section>

        <div class="work-board-grid">
            <section class="work-board" id="poetry-board">
                <div class="work-board-header">
                    <h2>诗歌</h2>
                    <span id="poetry-count" class="work-count">0 篇</span>
                </div>
                <div class="portfolio-list" id="poetry-list">
                    <!-- 诗歌列表由 JS 动态生成 -->
                </div>
            </section>

            <section class="work-board" id="prose-board">
                <div class="work-board-header">
                    <h2>散文</h2>
                    <span id="prose-count" class="work-count">0 篇</span>
                </div>
                <div class="portfolio-list" id="prose-list">
                    <!-- 散文列表由 JS 动态生成 -->
                </div>
            </section>
        </div>

        <div style="text-align:center; margin-top:2em; margin-bottom:2em;">
            <a href="index.html" class="back-home-btn">返回主页</a>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 介之的世界 | jiezhiworld</p>
    </footer>
    <script src="works-data.js"></script>
    <script src="js/works-store.js"></script>
    <script src="js/portfolio.js"></script>
</body>
</html>
